<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Макет | Админ-панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PT Sans', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .placeholder-line {
            display: block;
            background: #d0d0d0;
            border-radius: 4px;
            height: 14px;
        }

        .placeholder-line.title {
            height: 24px;
            width: 60%;
        }

        .placeholder-line.subtitle {
            height: 16px;
            width: 40%;
        }

        .placeholder-line.input {
            height: 38px;
            width: 100%;
            border-radius: 8px;
        }

        .placeholder-line.btn {
            height: 44px;
            width: 100%;
            border-radius: 8px;
        }

        .placeholder-line.stat {
            height: 32px;
            width: 60px;
            margin: 0 auto 4px;
        }

        .placeholder-line.stat-label {
            height: 12px;
            width: 40px;
            margin: 0 auto;
        }

        .placeholder-icon {
            color: #b0b0b0;
            font-size: 28px;
            display: inline-block;
        }

        .placeholder-icon.large {
            font-size: 36px;
        }

        .admin-container {
            width: 100%;
            max-width: 1200px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            display: none;
        }

        .login-container.active {
            display: block;
        }

        .admin-container.active {
            display: block;
        }

        .login-card {
            background: #f0f0f0;
            padding: 40px 35px;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-section .placeholder-icon {
            font-size: 42px;
            background: #e8e8e8;
            padding: 15px;
            border-radius: 50%;
            margin-bottom: 12px;
            display: inline-block;
        }

        .logo-section .placeholder-line {
            background: #d0d0d0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #999;
        }

        .form-group label i {
            color: #b0b0b0;
        }

        .btn-admin-login {
            background: #d0d0d0;
            color: #999;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-family: 'PT Sans', sans-serif;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
            cursor: default;
        }

        .btn-admin-login i {
            color: #b0b0b0;
        }

        .back-link {
            text-align: center;
            margin-top: 16px;
        }

        .back-link a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            cursor: default;
        }

        /* Панель администратора */
        .admin-header {
            background: #f0f0f0;
            border-radius: 16px;
            padding: 20px 28px;
            border: 1px solid #e0e0e0;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .admin-header-left .placeholder-icon {
            font-size: 32px;
            background: #e8e8e8;
            padding: 10px;
            border-radius: 50%;
        }

        .admin-header-left .placeholder-line {
            background: #d0d0d0;
            height: 24px;
            width: 200px;
        }

        .admin-header-left .badge {
            background: #d0d0d0;
            color: #aaa;
            font-size: 12px;
            padding: 3px 12px;
            border-radius: 20px;
        }

        .admin-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-header-right .placeholder-line {
            height: 14px;
            width: 80px;
        }

        .btn-logout {
            background: #e8e8e8;
            color: #999;
            border: 1px solid #e0e0e0;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'PT Sans', sans-serif;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: default;
        }

        .btn-logout i {
            color: #b0b0b0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            text-align: center;
        }

        .stat-card .placeholder-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 6px;
        }

        .stat-card .placeholder-line {
            background: #d0d0d0;
        }

        .filters-section {
            background: #f0f0f0;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .filters-section .placeholder-line {
            background: #d0d0d0;
            height: 38px;
            width: 150px;
            border-radius: 8px;
        }

        .filters-section .placeholder-line.small {
            width: 120px;
        }

        .filters-section .placeholder-line.medium {
            width: 180px;
        }

        .table-container {
            background: #f0f0f0;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #e8e8e8;
        }

        th {
            padding: 14px 16px;
            text-align: left;
            color: #999;
            border-bottom: 2px solid #d0d0d0;
        }

        th .placeholder-line {
            height: 14px;
            width: 60px;
            background: #d0d0d0;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            color: #999;
        }

        td .placeholder-line {
            height: 14px;
            background: #d0d0d0;
        }

        td .placeholder-line.small {
            width: 60px;
        }

        td .placeholder-line.medium {
            width: 100px;
        }

        td .placeholder-line.badge {
            height: 24px;
            width: 80px;
            border-radius: 20px;
        }

        td .placeholder-line.select {
            height: 30px;
            width: 120px;
            border-radius: 6px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 16px 20px;
            border-top: 1px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .pagination .placeholder-line {
            height: 32px;
            width: 60px;
            border-radius: 6px;
            background: #d0d0d0;
        }

        .pagination .placeholder-line.small {
            width: 40px;
        }

        .pagination .placeholder-line.page-info {
            width: 100px;
            height: 16px;
            background: #d0d0d0;
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 28px 20px;
            }

            .admin-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .admin-header-right {
                width: 100%;
                justify-content: space-between;
            }

            .filters-section {
                flex-direction: column;
                align-items: stretch;
            }

            .filters-section .placeholder-line {
                width: 100%;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .admin-header-left .placeholder-line {
                width: 120px;
            }

            th .placeholder-line {
                width: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container active">
        <!-- Шапка -->
        <header class="admin-header">
            <div class="admin-header-left">
                <span class="placeholder-icon"><i class="fas fa-user-shield"></i></span>
                <span class="placeholder-line"></span>
                <span class="badge">Admin</span>
            </div>
            <div class="admin-header-right">
                <span class="placeholder-line"></span>
                <span class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Выйти
                </span>
            </div>
        </header>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="placeholder-icon"><i class="fas fa-file-alt"></i></span>
                <span class="placeholder-line stat"></span>
                <span class="placeholder-line stat-label"></span>
            </div>
            <div class="stat-card">
                <span class="placeholder-icon"><i class="fas fa-clock"></i></span>
                <span class="placeholder-line stat"></span>
                <span class="placeholder-line stat-label"></span>
            </div>
            <div class="stat-card">
                <span class="placeholder-icon"><i class="fas fa-spinner"></i></span>
                <span class="placeholder-line stat"></span>
                <span class="placeholder-line stat-label"></span>
            </div>
            <div class="stat-card">
                <span class="placeholder-icon"><i class="fas fa-check-circle"></i></span>
                <span class="placeholder-line stat"></span>
                <span class="placeholder-line stat-label"></span>
            </div>
        </div>

        <!-- Фильтры -->
        <div class="filters-section">
            <span class="placeholder-line small"></span>
            <span class="placeholder-line small"></span>
            <span class="placeholder-line medium"></span>
        </div>

        <!-- Таблица -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th><span class="placeholder-line"></span></th>
                        <th><span class="placeholder-line"></span></th>
                        <th><span class="placeholder-line"></span></th>
                        <th><span class="placeholder-line"></span></th>
                        <th><span class="placeholder-line"></span></th>
                        <th><span class="placeholder-line"></span></th>
                        <th><span class="placeholder-line"></span></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><span class="placeholder-line"></span></td>
                        <td><span class="placeholder-line medium"></span></td>
                        <td><span class="placeholder-line small"></span></td>
                        <td><span class="placeholder-line small"></span></td>
                        <td><span class="placeholder-line medium"></span></td>
                        <td><span class="placeholder-line badge"></span></td>
                        <td><span class="placeholder-line select"></span></td>
                    </tr>
                    <tr>
                        <td><span class="placeholder-line"></span></td>
                        <td><span class="placeholder-line medium"></span></td>
                        <td><span class="placeholder-line small"></span></td>
                        <td><span class="placeholder-line small"></span></td>
                        <td><span class="placeholder-line medium"></span></td>
                        <td><span class="placeholder-line badge"></span></td>
                        <td><span class="placeholder-line select"></span></td>
                    </tr>
                    <tr>
                        <td><span class="placeholder-line"></span></td>
                        <td><span class="placeholder-line medium"></span></td>
                        <td><span class="placeholder-line small"></span></td>
                        <td><span class="placeholder-line small"></span></td>
                        <td><span class="placeholder-line medium"></span></td>
                        <td><span class="placeholder-line badge"></span></td>
                        <td><span class="placeholder-line select"></span></td>
                    </tr>
                </tbody>
            </table>
            <div class="pagination">
                <span class="placeholder-line small"></span>
                <span class="placeholder-line page-info"></span>
                <span class="placeholder-line small"></span>
            </div>
        </div>
    </div>
</body>
</html>
