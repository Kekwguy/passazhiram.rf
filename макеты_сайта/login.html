<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Макет | Вход и регистрация</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PT Sans', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .placeholder-line {
            display: block;
            background: #d0d0d0;
            border-radius: 4px;
            height: 14px;
            margin-bottom: 6px;
        }

        .placeholder-line.title {
            height: 28px;
            width: 70%;
            margin: 0 auto 6px;
        }

        .placeholder-line.subtitle {
            height: 16px;
            width: 50%;
            margin: 0 auto;
        }

        .placeholder-line.input {
            height: 44px;
            width: 100%;
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .placeholder-line.btn {
            height: 44px;
            width: 100%;
            border-radius: 8px;
            margin-top: 4px;
        }

        .placeholder-icon {
            color: #b0b0b0;
            font-size: 42px;
            display: inline-block;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
        }

        .auth-card {
            background: #f0f0f0;
            padding: 40px 35px;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-section .placeholder-icon {
            font-size: 42px;
            background: #e8e8e8;
            padding: 15px;
            border-radius: 50%;
            margin-bottom: 12px;
            display: inline-block;
        }

        .logo-section .placeholder-line {
            background: #d0d0d0;
        }

        .tab-switcher {
            display: flex;
            background: #e8e8e8;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-family: 'PT Sans', sans-serif;
            font-size: 15px;
            color: #999;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: default;
        }

        .tab-btn i {
            color: #b0b0b0;
        }

        .tab-btn.active {
            background: #f5f5f5;
            color: #666;
        }

        .tab-btn.active i {
            color: #888;
        }

        .auth-panel {
            display: none;
        }

        .auth-panel.active {
            display: block;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #999;
        }

        .form-group label i {
            color: #b0b0b0;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .half {
            flex: 1;
        }

        .btn-primary {
            background: #d0d0d0;
            color: #999;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-family: 'PT Sans', sans-serif;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
            cursor: default;
        }

        .btn-primary i {
            color: #b0b0b0;
        }

        .form-footer {
            text-align: center;
            padding-top: 6px;
            font-size: 14px;
            color: #999;
            border-top: 1px solid #e0e0e0;
            padding-top: 16px;
            margin-top: 4px;
        }

        .form-footer .link {
            color: #aaa;
            text-decoration: none;
            cursor: default;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 28px 20px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .tab-btn span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-section">
                <span class="placeholder-icon"><i class="fas fa-bus"></i></span>
                <span class="placeholder-line title"></span>
            </div>

            <!-- Переключатель вкладок -->
            <div class="tab-switcher">
                <span class="tab-btn active">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Вход</span>
                </span>
                <span class="tab-btn">
                    <i class="fas fa-user-plus"></i>
                    <span>Регистрация</span>
                </span>
            </div>

            <!-- Панель входа -->
            <div class="auth-panel active">
                <div class="auth-form">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Логин</label>
                        <span class="placeholder-line input"></span>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <span class="placeholder-line input"></span>
                    </div>

                    <span class="btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
